<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Crypto</title>

<style>




/* ================= NAVBAR ================= */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 8%;
  background:#fff;
  position:fixed;
  width:100%;
  top:0;
  box-shadow:0 2px 15px rgba(0,0,0,0.05);
  z-index:1000;
} 

/* Menu */
nav ul{
  list-style:none;
  display:flex;
  gap:20px;
  align-items:;
}

nav ul li{
  position:left;
}

nav ul li a{
  text-decoration:none;
  color:#333;
  font-weight:500;
  transition:.3s;
  padding:5px 0;
}

nav ul li a:hover{
  color:#007BFF;
}



body{
font-family: Arial;
background:#0b0e11;
color:white;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1e2329;
padding:25px;
border-radius:10px;
margin-top:20px;
}

h2{
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:none;
background:#2b3139;
color:white;
}

.balance{
background:#2b3139;
padding:12px;
border-radius:6px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#fcd535;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.history{
margin-top:25px;
}

.history table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

.history th, .history td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

@media(max-width:600px){
.container{
padding:10px;
}
}

</style>
</head>

<body>
    
    <br><br>

    
    <nav class="navbar">
     
        <ul>
            <li style="color: black ;">
                
                <a href="profile.html">◀️</a>Back</li>
            <li>
        </ul>
    </nav>

<div class="container">

<div class="card">

<h2>Withdraw Crypto</h2>


<label>Select Coin</label>
<select id="coin">
<option>USDT</option>
<option>Bitcoin</option>
<option>Ethereum</option>
</select>

<label>Select Network</label>
<select id="network">
<option>TRC20</option>
<option>ERC20</option>
<option>BEP20</option>
</select>

<label>Wallet Address</label>
<input type="text" id="address" placeholder="Enter wallet address">

<label>Amount</label>
<input type="number" id="amount" placeholder="Enter amount">

<p>Withdrawal Fee: <span id="fee">1 USDT</span></p>

<button onclick="withdraw()">Withdraw</button>

<p id="message"></p>

</div>

<div class="card history">

<h3>Withdrawal History</h3>

<table>
<thead>
<tr>
<th>Coin</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history">
</tbody>

</table>

</div>

</div>

<script>

let balance = 1500;

function withdraw(){

let coin = document.getElementById("coin").value;
let amount = document.getElementById("amount").value;
let address = document.getElementById("address").value;

if(address === "" || amount === ""){
document.getElementById("message").innerText="Please fill all fields";
return;
}

if(amount > balance){
document.getElementById("message").innerText="Insufficient balance";
return;
}

balance -= amount;

document.getElementById("balance").innerText = balance + " USDT";

let row = document.createElement("tr");

row.innerHTML = `
<td></td>
<td></td>
<td style="color:orange;">Pending</td>
`;

document.getElementById("history").appendChild(row);

document.getElementById("message").innerText="Withdrawal request submitted";

}

</script>

<script src="auth.js"></script>

</body>
</html>
